name = "turborepo-remote-cache"
main = "src/api.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "no_handle_cross_request_promise_resolution"]
workers_dev = false
preview_urls = false

routes = [{ pattern = "turborepo.chrisvouga.dev", custom_domain = true }]

# Vault scope for Worker boot (see apps/api/src/config/env.ts). Only
# VAULT_TOKEN is a Wrangler secret; addr/project/config are plain vars.
#
# dev and prd target the SAME Worker (turborepo-remote-cache); the only
# difference is which Vault config the Worker reads at boot. Without an
# explicit name here wrangler would append "-dev" and provision a second
# Worker (turborepo-remote-cache-dev).
[env.dev]
name = "turborepo-remote-cache"
vars = { VAULT_ADDR = "https://secret-store.chrisvouga.dev", VAULT_PROJECT = "personal", VAULT_CONFIG = "dev" }

[env.prd]
name = "turborepo-remote-cache"
vars = { VAULT_ADDR = "https://secret-store.chrisvouga.dev", VAULT_PROJECT = "personal", VAULT_CONFIG = "prd" }

[observability]
[observability.logs]
enabled = true
invocation_logs = true
