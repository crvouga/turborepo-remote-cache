# Fly.io app config for the Turborepo remote cache server.
# App creation, secrets, TLS cert, and deploy are handled by CI (see apps/api/scripts/fly-deploy.ts).

app = 'turborepo-remote-cache'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  VAULT_ADDR = 'https://vault.chrisvouga.dev'
  VAULT_PROJECT = 'personal'
  VAULT_CONFIG = 'prd'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
