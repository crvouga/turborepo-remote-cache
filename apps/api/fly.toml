# Fly.io runtime config only — image is published to GHCR and deployed via --image.

app = 'turborepo-remote-cache'
primary_region = 'lax'

[env]
  PORT = '8080'
  VAULT_ADDR = 'https://vault.chrisvouga.dev'
  VAULT_PROJECT = 'personal'
  VAULT_CONFIG = 'prd'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '60s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    timeout = '10s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
