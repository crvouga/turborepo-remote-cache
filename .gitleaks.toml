# https://github.com/gitleaks/gitleaks#configuration
title = "gamezilla gitleaks config"

[extend]
useDefault = true

# False positive: the prose "typed tokens, parent/child scoping" in llm.md
# trips the default `generic-api-key` rule because "tokens" is a keyword and
# "parent/child" looks high-entropy enough to score as a value. llm.md is
# documentation only -- real secrets live in Doppler, not in markdown.
[[allowlists]]
description = "DI documentation prose in llm.md"
paths = ['''(?:^|/)llm\.md$''']
regexes = ['''typed tokens,\s+parent/child\s+scoping''']
regexTarget = "line"
