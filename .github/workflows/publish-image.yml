name: Publish image

on:
  push:
    branches:
      - main
    paths:
      - apps/api/**
      - package.json
      - bun.lock
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: crvouga/chrisvouga.dev/.github/workflows/reusable-publish-image.yml@main
    secrets:
      DEPLOY_DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
    with:
      service_id: turborepo
      dockerfile: apps/api/Dockerfile
      context: .
