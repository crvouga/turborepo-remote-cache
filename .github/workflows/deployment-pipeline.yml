# CI checks on every push/PR; deploy on main runs in parallel (no check gate).
# CI authenticates to Vault via GitHub OIDC (no stored token).
name: Deployment Pipeline

permissions:
  contents: read
  id-token: write
  packages: write

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FLY_APP: turborepo-remote-cache
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: check-${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
      cancel-in-progress: true
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Import Vault secrets (dev)
        uses: hashicorp/vault-action@v4
        with:
          url: https://vault.chrisvouga.dev
          method: jwt
          path: jwt
          role: github-actions
          jwtGithubAudience: https://vault.chrisvouga.dev
          secrets: |
            secret/data/personal/dev TURBO_TOKEN | TURBO_TOKEN ;
            secret/data/personal/dev TURBO_API | TURBO_API ;
            secret/data/personal/dev TURBO_TEAM | TURBO_TEAM ;
            secret/data/personal/dev TURBO_CACHE | TURBO_CACHE ;
            secret/data/personal/dev B2_S3_ENDPOINT | B2_S3_ENDPOINT ;
            secret/data/personal/dev B2_S3_REGION | B2_S3_REGION ;
            secret/data/personal/dev B2_S3_ACCESS_KEY_ID | B2_S3_ACCESS_KEY_ID ;
            secret/data/personal/dev B2_S3_SECRET_ACCESS_KEY | B2_S3_SECRET_ACCESS_KEY ;
            secret/data/personal/dev B2_BUCKET | B2_BUCKET ;
            secret/data/personal/dev VAULT_TOKEN | VAULT_TOKEN ;
            secret/data/personal/dev FLY_API_TOKEN | FLY_API_TOKEN ;
            secret/data/personal/dev CLOUDFLARE_API_TOKEN | CLOUDFLARE_API_TOKEN ;
            secret/data/personal/dev GHCR_READ_TOKEN | GHCR_READ_TOKEN
      - name: Verify Vault secrets (dev)
        env:
          CI: true
          GITHUB_ACTIONS: true
          VAULT_CONFIG: dev
          VAULT_PROJECT: personal
        run: bun run scripts/check-vault-secrets.ts
      - name: Turbo CI (format, tc, lint, test, build)
        run: bun run check

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Import Vault secrets (prd)
        uses: hashicorp/vault-action@v4
        with:
          url: https://vault.chrisvouga.dev
          method: jwt
          path: jwt
          role: github-actions
          jwtGithubAudience: https://vault.chrisvouga.dev
          secrets: |
            secret/data/personal/prd TURBO_TOKEN | TURBO_TOKEN ;
            secret/data/personal/prd TURBO_API | TURBO_API ;
            secret/data/personal/prd TURBO_TEAM | TURBO_TEAM ;
            secret/data/personal/prd TURBO_CACHE | TURBO_CACHE ;
            secret/data/personal/prd B2_S3_ENDPOINT | B2_S3_ENDPOINT ;
            secret/data/personal/prd B2_S3_REGION | B2_S3_REGION ;
            secret/data/personal/prd B2_S3_ACCESS_KEY_ID | B2_S3_ACCESS_KEY_ID ;
            secret/data/personal/prd B2_S3_SECRET_ACCESS_KEY | B2_S3_SECRET_ACCESS_KEY ;
            secret/data/personal/prd B2_BUCKET | B2_BUCKET ;
            secret/data/personal/prd VAULT_TOKEN | VAULT_TOKEN ;
            secret/data/personal/prd FLY_API_TOKEN | FLY_API_TOKEN ;
            secret/data/personal/prd CLOUDFLARE_API_TOKEN | CLOUDFLARE_API_TOKEN ;
            secret/data/personal/prd GHCR_READ_TOKEN | GHCR_READ_TOKEN
      - name: Verify Vault secrets (prd)
        env:
          CI: true
          GITHUB_ACTIONS: true
          VAULT_CONFIG: prd
          VAULT_PROJECT: personal
        run: bun run scripts/check-vault-secrets.ts
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        env:
          CI: true
          GITHUB_ACTIONS: true
          DEPLOY_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          GHCR_USERNAME: ${{ github.repository_owner }}
        run: bun run --filter @apps/api deploy
      - name: Smoke test remote cache
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: bun run scripts/smoke-test-cache.ts
