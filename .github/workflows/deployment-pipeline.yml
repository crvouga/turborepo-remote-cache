# Single workflow: CI checks on every push/PR, deploy on main after checks pass.
# GitHub repo secret: DOPPLER_SERVICE_TOKEN (project Doppler token for CI/deploy).
name: Deployment Pipeline

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: check-${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
      cancel-in-progress: true
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - name: Verify Doppler secrets (dev)
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: bun run check:doppler-secrets
      - name: Turbo CI (format, tc, lint, test, build)
        run: bun run check

  deploy:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - name: Verify Doppler secrets (prd)
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: bun run check:doppler-secrets:prd
      - name: Deploy Worker
        run: bun run deploy
